apiVersion: v1
kind: Pod
metadata:
  name: secret-pod
spec:
  containers:
  - name: busybox
    image: busybox:latest
    command:
      - sleep
      - "3600"
    env:
      - name: DB_USER
        valueFrom:
          secretKeyRef:
            name: db-credentials
            key: DB_USER

    volumeMounts:
      - name: db-secret
        mountPath: /etc/db-credentials
        readOnly: true

  volumes:
    - name: db-secret
      secret:
        secretName: db-credentials
