apiVersion: v1
kind: Pod
metadata:
  name: busybox-pod
spec:
  containers:
  - name: busybox
    image: busybox:latest
    command:
      - sh
      - -c
      - |
        echo "APP_ENV=$APP_ENV"
        echo "APP_DEBUG=$APP_DEBUG"
        echo "APP_PORT=$APP_PORT"
        sleep 3600
    envFrom:
      - configMapRef:
          name: app-config
